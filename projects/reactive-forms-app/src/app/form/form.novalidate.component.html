<div class='container' style='width:500px'>
  <form [formGroup]='personForm' (submit)='submitForm()'>

    <div class='form-group'>
      <label>Name</label>
      <input type="text" formControlName='name' class="form-control" />
    </div>
    <div class='form-group'>
      <label>Address</label>
      <input type="text" formControlName='address' class="form-control" />
    </div>
    <div class='form-group'>
      <label>About</label>
      <textarea formControlName='about' class="form-control" ></textarea>
    </div>
    <div class=‘radio’>
      Gender
      <label> <input type="radio" formControlName="gender" value='M'>Male </label>
      <label> <input type="radio" formControlName="gender" value='F'>Female </label>
    </div>

    <button type='submit' class='btn btn-primary' >Submit</button>

    <div>{{personForm.value|json}}</div>
  </form>
</div>
