<div *ngIf="emp != null; else noemp">
    <h5>Employee Details</h5>

    <p>Employee Id: {{emp.empid}}</p>
    <p>Name: {{emp.name}}</p>
    <p>Salary: {{emp.salary}}</p>
    
</div>

<ng-template #noemp>
    <h4>No such Employee with the given Id {{selectedId}}</h4>
</ng-template>

<div>
    <button class='btn btn-danger' (click)="goBack()">Back</button>
</div>
