<div class='container' style='width:400px;float:left;'>
  <form [formGroup]="nameForm" (submit)='submitForm()'>
    <div class='form-group'>
      <label> First Name:</label>
      <input type="text" class='form-control' formControlName="firstName">
    </div>
    <div class="alert alert-danger" *ngIf="f['firstName'].touched && f['firstName'].invalid">
      <div *ngIf="f['firstName'].errors && f['firstName'].errors['required']">
        First Name is required
      </div>
      <div *ngIf="f['firstName'].errors && f['firstName'].errors['minlength']">
        First Name should be minimum {{f['firstName'].errors['minlength'].requiredLength}} characters
      </div>
    </div>
    <div class='form-group'>
      <label> Last Name:</label>
      <input type="text" class='form-control' formControlName="lastName">
    </div>
    <div class="alert alert-danger" *ngIf="f['lastName'].touched && f['lastName'].invalid">
      <div *ngIf="f['lastName'].errors && f['lastName'].errors['required']">
        Last Name is required
      </div>
      
      <div *ngIf="f['lastName'].errors && f['lastName'].errors['minlength']">
        Last Name should be minimum {{f['lastName'].errors['minlength'].requiredLength}} characters
      </div>
    </div>

    <div class='form-group'>
      <label> Description:</label>
      <textarea class='form-control' formControlName="description"></textarea>
    </div>

    <button type='submit' class='btn btn-primary btn-block'  [disabled]='nameForm.invalid'>Submit</button>

  </form>
</div>
